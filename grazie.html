<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie! | DAOP APS</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://www.daop.it/grazie.html">
<link rel="icon" href="assets/images/icon-512.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#2d4a5c; --navy-dark:#1e3342; --orange:#e8954a; --orange-dark:#d4793a;
    --gold:#c9a227; --cream:#fdf8f3; --text-mid:#4a6070;
    --radius-md:16px; --transition:0.3s cubic-bezier(0.4,0,0.2,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,var(--navy-dark) 0%,var(--navy) 60%,#3a6070 100%);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;line-height:1.6}
  .card{max-width:520px;text-align:center}
  .badge{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 12px 40px rgba(0,0,0,0.4));margin:0 auto 28px;display:block}
  .label{display:inline-block;font-size:0.78rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,2.8rem);font-weight:800;line-height:1.15;margin-bottom:16px}
  p{font-size:1.05rem;color:rgba(255,255,255,0.72);margin:0 auto 32px;max-width:420px}
  .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:var(--radius-md);font-size:0.95rem;font-weight:600;text-decoration:none;transition:var(--transition);font-family:'DM Sans',sans-serif}
  .btn-gold{background:var(--gold);color:white;box-shadow:0 4px 16px rgba(201,162,39,0.35)}
  .btn-gold:hover{background:#b08e1f;transform:translateY(-2px)}
  .btn-ghost{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2)}
  .btn-ghost:hover{background:rgba(255,255,255,0.18)}
</style>
</head>
<body>
  <div class="card">
    <img class="badge" src="assets/images/adesivo-daop.webp" alt="Bollino Consigliato DAOP – Family Friendly">
    <span class="label">Messaggio ricevuto</span>
    <h1>Grazie, ci siamo!</h1>
    <p>Abbiamo ricevuto il tuo messaggio. Lo leggiamo con calma e ti ricontattiamo al più presto.</p>
    <div class="actions">
      <a href="bollino.html" class="btn btn-gold">Torna al bollino</a>
      <a href="index.html" class="btn btn-ghost">Vai alla home</a>
    </div>
  </div>
</body>
</html>
